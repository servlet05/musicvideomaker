<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DHALIUS · Guitar Shader Deform</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a15; color: #fff; font-family: sans-serif; }
        #ui-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.8);
            padding: 12px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            align-items: center;
        }
        #file-input { display: none; }
        .ui-btn {
            padding: 8px 16px;
            background: #444;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 20px;
        }
        .ui-btn:hover { background: #666; }
        #status-text {
            font-size: 0.8rem;
            color: #aaa;
            min-width: 100px;
            text-align: center;
        }
        #recording-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ff0055;
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: bold;
            display: none;
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
        #error-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,0,0,0.8);
            color: white;
            padding: 20px 40px;
            border-radius: 15px;
            font-size: 1.5rem;
            text-align: center;
            display: none;
            z-index: 20;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="recording-indicator">🔴 GRABANDO</div>
    <div id="error-message">⚠️ Error al cargar el modelo</div>

    <div id="ui-container">
        <label for="file-input" class="ui-btn">📂 Cargar MP3</label>
        <input type="file" id="file-input" accept="audio/*">
        <button id="record-btn" class="ui-btn">⏺️ Grabar</button>
        <button id="stop-record-btn" class="ui-btn" style="display: none;">⏹️ Detener</button>
        <div id="status-text">Carga música</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // ----- INICIALIZACIÓN -----
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a15);
        scene.fog = new THREE.FogExp2(0x0a0a15, 0.003);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 1.5, 6);

        const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.prepend(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableZoom = true;
        controls.target.set(0, 1, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // ----- ILUMINACIÓN -----
        scene.add(new THREE.AmbientLight(0xffffff, 0.3));

        const light1 = new THREE.DirectionalLight(0xffffff, 1.5);
        light1.position.set(0, 4, 6);
        light1.castShadow = true;
        light1.shadow.mapSize.width = 1024;
        light1.shadow.mapSize.height = 1024;
        scene.add(light1);

        const light2 = new THREE.PointLight(0xff0055, 1.5, 15);
        light2.position.set(-4, 2, 2);
        scene.add(light2);
        const light3 = new THREE.PointLight(0x00ffcc, 1.5, 15);
        light3.position.set(4, 2, 2);
        scene.add(light3);

        // ----- AUDIO -----
        let analyser = null;
        let dataArray = null;
        let isAudioPlaying = false;
        const statusText = document.getElementById('status-text');

        document.getElementById('file-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const audioElement = new Audio();
            audioElement.src = URL.createObjectURL(file);
            audioElement.loop = true;

            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 128;

            const source = audioCtx.createMediaElementSource(audioElement);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);

            audioElement.play();
            isAudioPlaying = true;
            statusText.textContent = "▶️ Reproduciendo";
            statusText.style.color = "#00ffcc";
            dataArray = new Uint8Array(analyser.frequencyBinCount);
        });

        // ----- PARTÍCULAS -----
        const particleCount = 2000;
        const particleGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const particleColors = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            const radius = 2 + Math.random() * 10;
            const angle = Math.random() * Math.PI * 2 + i * 0.05;
            const height = (Math.random() - 0.5) * 8;
            positions[i*3] = Math.cos(angle) * radius;
            positions[i*3+1] = height + 1;
            positions[i*3+2] = Math.sin(angle) * radius;
            const col = new THREE.Color().setHSL(Math.random(), 1, 0.5);
            particleColors[i*3] = col.r;
            particleColors[i*3+1] = col.g;
            particleColors[i*3+2] = col.b;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
        const particleMat = new THREE.PointsMaterial({ size: 0.05, vertexColors: true, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
        const particleSystem = new THREE.Points(particleGeo, particleMat);
        scene.add(particleSystem);

        // ----- CARGA DEL MODELO 'guitar.glb' -----
        let guitarPlayer = null;
        let playerGroup = new THREE.Group();
        scene.add(playerGroup);

        const loader = new THREE.GLTFLoader();
        const errorMsg = document.getElementById('error-message');
        
        loader.load('guitar.glb', function (gltf) {
            guitarPlayer = gltf.scene;
            
            // Escalar
            const box = new THREE.Box3().setFromObject(guitarPlayer);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const targetHeight = 2.0;
            const scale = targetHeight / maxDim;
            guitarPlayer.scale.set(scale, scale, scale);
            
            // Centrar
            box.setFromObject(guitarPlayer);
            const center = box.getCenter(new THREE.Vector3());
            guitarPlayer.position.set(0, -center.y, 0);
            guitarPlayer.position.y += 0.1;
            
            guitarPlayer.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                    // 🔥 APLICAR EL SHADER DE DEFORMACIÓN A CADA MALLA
                    applyDeformationShader(child);
                }
            });

            playerGroup.add(guitarPlayer);
            errorMsg.style.display = 'none';
            console.log("✅ guitar.glb cargado con Shader de deformación.");
            
        }, undefined, function (error) {
            console.error("❌ Error al cargar guitar.glb:", error);
            errorMsg.style.display = 'block';
        });

        // ----- SHADER DE DEFORMACIÓN (ONDA SINUSOIDAL) -----
        function applyDeformationShader(mesh) {
            // Obtenemos el material original
            const originalMat = mesh.material;

            // Creamos un ShaderMaterial que hereda las propiedades del original
            // pero reemplaza el vertex shader para deformar los puntos.
            const shaderMat = new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 },
                    bassIntensity: { value: 0 },
                    midIntensity: { value: 0 },
                    // Pasamos el mapa de textura original para que no pierda los colores
                    map: { value: originalMat.map },
                    color: { value: originalMat.color }
                },
                vertexShader: `
                    uniform float time;
                    uniform float bassIntensity;
                    uniform float midIntensity;
                    
                    varying vec2 vUv;
                    varying vec3 vNormal;

                    void main() {
                        vUv = uv;
                        vNormal = normalize(normalMatrix * normal);

                        // Onda principal (bajos): deforma en el eje Y con ondas suaves
                        float waveY = sin(position.x * 2.0 + time * 0.8) * 0.04 * bassIntensity;
                        float waveX = cos(position.y * 3.0 + time * 0.6) * 0.03 * midIntensity;
                        float waveZ = sin(position.y * 1.5 + position.x * 1.5 + time * 1.0) * 0.02 * (bassIntensity + midIntensity);

                        // Deformar el vértice aplicando las ondas al eje correspondiente
                        vec3 newPos = position;
                        newPos.y += waveY;
                        newPos.x += waveX;
                        newPos.z += waveZ;

                        // Calcular la posición final
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(newPos, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform vec3 color;
                    uniform sampler2D map;
                    
                    varying vec2 vUv;
                    varying vec3 vNormal;

                    void main() {
                        // Textura original
                        vec4 texColor = texture2D(map, vUv);
                        
                        // Agregamos un efecto de iluminación simple basado en la normal deformada
                        vec3 lightDir = normalize(vec3(1.0, 2.0, 1.0));
                        float diff = max(dot(vNormal, lightDir), 0.0);
                        vec3 finalColor = texColor.rgb * (0.5 + 0.5 * diff);
                        
                        gl_FragColor = vec4(finalColor, 1.0);
                    }
                `,
                side: THREE.DoubleSide
            });

            // Reemplazamos el material de la malla con nuestro Shader
            mesh.material = shaderMat;
            // Guardamos referencia para actualizar los uniforms en el loop
            mesh.userData.shaderUniforms = shaderMat.uniforms;
        }

        // ----- SISTEMA DE CÁMARA -----
        let currentShot = { pos: new THREE.Vector3(0, 1.5, 6), target: new THREE.Vector3(0, 1, 0) };
        let isRotating = false;
        let rotationSpeed = 0;
        let rotationAngle = 0;
        let cutTimer = 0;

        function generateRandomShot() {
            const radius = 2.5 + Math.random() * 4.5;
            const theta = Math.random() * Math.PI * 2;
            const phi = (Math.random() - 0.5) * Math.PI * 0.7;
            const x = Math.sin(theta) * Math.cos(phi) * radius;
            const y = Math.sin(phi) * radius + 1;
            const z = Math.cos(theta) * Math.cos(phi) * radius;
            return { pos: new THREE.Vector3(x, y, z), target: new THREE.Vector3(0, 1, 0) };
        }

        function performCut(energy) {
            const isStill = Math.random() < 0.6;
            const newShot = generateRandomShot();
            currentShot = newShot;
            camera.position.copy(newShot.pos);
            controls.target.copy(newShot.target);
            controls.update();

            if (isStill) {
                isRotating = false;
                cutTimer = 2.5 + Math.random() * 3.0 - (energy * 1.0);
                cutTimer = Math.max(1.5, cutTimer);
            } else {
                isRotating = true;
                rotationSpeed = 0.2 + (energy * 0.8);
                cutTimer = 2.0 + Math.random() * 2;
            }
        }

        // ----- GRABACIÓN -----
        let mediaRecorder, recordedChunks = [];
        const recordBtn = document.getElementById('record-btn');
        const stopBtn = document.getElementById('stop-record-btn');
        const indicator = document.getElementById('recording-indicator');

        recordBtn.addEventListener('click', () => {
            recordedChunks = [];
            const stream = renderer.domElement.captureStream(30);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'Dhalius_ShaderDeform.webm';
                a.click();
                URL.revokeObjectURL(url);
                recordBtn.style.display = 'block'; stopBtn.style.display = 'none'; indicator.style.display = 'none';
            };
            mediaRecorder.start();
            recordBtn.style.display = 'none'; stopBtn.style.display = 'block'; indicator.style.display = 'block';
        });

        stopBtn.addEventListener('click', () => { if(mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop(); });

        // ----- ANIMACIÓN -----
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.02;

            let bass = 0, mid = 0, energy = 0;
            if (analyser && isAudioPlaying) {
                analyser.getByteFrequencyData(dataArray);
                for(let i=0; i<8; i++) bass += dataArray[i];
                bass = bass / 8 / 255;
                for(let i=8; i<32; i++) mid += dataArray[i];
                mid = mid / 24 / 255;
                energy = (bass + mid) / 2;
            }

            // Partículas
            const speedP = 0.3 + energy * 0.5;
            particleSystem.rotation.y += 0.01 * speedP;

            // 🔥 ACTUALIZAR UNIFORMS DEL SHADER DE DEFORMACIÓN
            if (guitarPlayer) {
                // Recorremos todas las mallas del modelo
                guitarPlayer.traverse((child) => {
                    if (child.isMesh && child.userData.shaderUniforms) {
                        const uniforms = child.userData.shaderUniforms;
                        uniforms.time.value = time;
                        uniforms.bassIntensity.value = bass * 3.0; // Los bajos deforman fuerte
                        uniforms.midIntensity.value = mid * 2.0;   // Los medios deforman medio
                    }
                });

                // Mantenemos un ligero movimiento de rotación del grupo completo
                // para que no parezca flotando muerto, pero la deformación es la protagonista.
                playerGroup.rotation.y += 0.002 * (1 + energy * 0.5);
            }

            // Cámara
            if (!controls.isDragging && isAudioPlaying) {
                if (isRotating) {
                    rotationAngle += 0.01 * rotationSpeed;
                    const radius = currentShot.pos.length();
                    const currentTheta = Math.atan2(currentShot.pos.x, currentShot.pos.z);
                    const newTheta = currentTheta + rotationAngle;
                    camera.position.x = Math.sin(newTheta) * radius;
                    camera.position.z = Math.cos(newTheta) * radius;
                    controls.update();
                }
                cutTimer -= 0.02;
                if (cutTimer <= 0) {
                    performCut(energy);
                }
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
